name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          # Build-time public env (non-secret placeholders are fine for `next build`).
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  migration-drift:
    # The sales-hub's #1 root cause was repo↔prod schema drift (hardening
    # migrations never deployed). This job fails if the linked project's schema
    # diverges from supabase/migrations. Requires SUPABASE_ACCESS_TOKEN +
    # SUPABASE_PROJECT_REF repo secrets; skipped automatically if not configured.
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check migrations match the linked project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::notice::Supabase secrets not configured — skipping migration-drift guard."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db diff --linked --schema public > drift.sql
          if [ -s drift.sql ]; then
            echo "::error::Live schema diverges from supabase/migrations:"
            cat drift.sql
            exit 1
          fi
          echo "No drift — migrations match the live project."
